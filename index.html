<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="myfoto.png" type="image/x-icon">
    <title>VirusV Profile</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0f172a;
            color: #f1f5f9;
            overflow-x: hidden
        }

        .wrapper {
            display: flex;
            min-height: 100vh
        }

        /* ---- САЙДБАР ---- */
        .sidebar {
            width: 160px;
            background: rgba(30, 41, 59, .7);
            backdrop-filter: blur(12px);
            border-right: 1px solid rgba(255, 255, 255, .1);
            display: flex;
            flex-direction: column;
            padding: 18px 10px;
            transition: width .4s cubic-bezier(.175, .885, .32, 1.275);
            position: relative;
            z-index: 100;
            overflow: hidden;
            flex-shrink: 0
        }

        .sidebar.collapsed {
            width: 58px
        }

        /* Мобильный оверлей */
        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .5);
            z-index: 99
        }

        .sidebar-overlay.show {
            display: block
        }

        /* На мобиле сайдбар выезжает поверх */
        @media(max-width:640px) {

            .sidebar.mobile-open ~ .mobile-menu-btn {
                display: none;
            }

            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                height: 100%;
                width: 220px;
                transform: translateX(-100%);
                transition: transform .35s ease;
                z-index: 100;
                padding: 20px 14px
            }

            .sidebar.mobile-open {
                transform: translateX(0)
            }

            .sidebar.collapsed {
                width: 220px;
                transform: translateX(-100%)
            }

            .sidebar.mobile-open.collapsed {
                transform: translateX(0)
            }

            .sidebar .nav-text,
            .sidebar .logo-text,
            .sidebar .sidebar-footer span {
                display: block !important
            }

            .sidebar .sidebar-nav a {
                justify-content: flex-start !important;
                padding: 12px 14px !important
            }

            .mobile-menu-btn {
                display: flex;
                position: fixed;
                top: 14px;
                left: 14px;
                z-index: 200;
                background: rgba(30, 41, 59, .9);
                border: 1px solid rgba(255, 255, 255, .1);
                color: white;
                width: 38px;
                height: 38px;
                border-radius: 8px;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                font-size: 18px
            }

            .main-content {
                padding-top: 64px
            }



            /* Адаптация селектора языка для мобилок */
            #lang-switch {
                width: 100%;
                margin-bottom: 10px;
            }

            .sidebar-footer {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        @media(min-width:641px) {
            .mobile-menu-btn {
                display: none
            }

            .sidebar-overlay {
                display: none !important
            }
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            padding: 0 8px;
            height: 35px
        }

        .sidebar.collapsed .sidebar-header {
            justify-content: center
        }

        .logo-text {
            font-weight: 800;
            font-size: 1.4rem;
            letter-spacing: -1px;
            white-space: nowrap
        }

        .logo-text .dot {
            color: #38bdf8
        }

        .sidebar.collapsed .logo-text {
            display: none
        }

        .sidebar.mobile-open #toggle-btn {
    display: flex !important;
}

        #toggle-btn {
            background: rgba(56, 189, 248, .3);
            border: none;
            color: white;
            width: 35px;
            height: 35px;
            min-width: 35px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: .3s;
            flex-shrink: 0
        }

        #toggle-btn:hover {
            background: #38bdf8
        }

        .sidebar-nav ul {
            list-style: none
        }

        .sidebar-nav li {
            margin-bottom: 4px
        }

        .sidebar-nav a {
            text-decoration: none;
            color: #94a3b8;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 8px;
            border-radius: 12px;
            transition: .3s;
            white-space: nowrap;
            height: 40px
        }

        .sidebar.collapsed .sidebar-nav a {
            justify-content: center;
            padding: 10px 0
        }

        .sidebar-nav li.active a,
        .sidebar-nav a:hover {
            background: rgba(56, 189, 248, .15);
            color: #38bdf8
        }

        .sidebar-nav i {
            font-size: 1.3em;
            min-width: 20px;
            text-align: center
        }

        .sidebar.collapsed .nav-text,
        .sidebar.collapsed .logo-text,
        .sidebar.collapsed .sidebar-footer span {
            display: none
        }

        .sidebar.collapsed .sidebar-footer {
            justify-content: center
        }

        .sidebar-footer {
            margin-top: auto;
            padding: 10px 8px;
            color: #475569;
            font-size: .8rem;
            display: flex;
            flex-direction: column;
            align-items: center !important;
            justify-content: flex-start;
            gap: 10px;
            white-space: nowrap;
            flex-wrap: wrap;
            overflow: hidden;
        }

        .footer-copy {
            display: flex;
            align-items: center;    /* Центрируем иконку и текст по вертикали */
            gap: 8px;               /* Расстояние от иконки до букв */
            white-space: nowrap;    /* Запрещаем перенос текста на новую строку */
            color: #475569;
            font-size: 0.8rem;
        }

        .footer-copy i {
            line-height: 0;         /* Убираем лишнюю высоту иконки, которая толкает текст */
            display: flex;
            align-items: center;
}

        .lang-select {
            background: rgba(255, 255, 255, .05);
            color: #f1f5f9;
            border: 1px solid rgba(56, 189, 248, .3);
            border-radius: 6px;
            padding: 4px;
            cursor: pointer;
            outline: none;
            font-size: 0.8rem;
        }

        .lang-select:hover {
            border-color: #38bdf8
        }

        .lang-select option {
            background: #1e293b;
            color: #fff;
        }

        .sidebar.collapsed .lang-select {
            display: none;
        }

        /* ---- ОСНОВНОЙ КОНТЕНТ ---- */
        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            padding: 20px;
            min-height: 100vh
        }

        .page {
            display: none;
            width: 100%;
            justify-content: center;
            align-items: center
        }

        .page.active {
            display: flex;
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ---- ГЛАВНАЯ ---- */
        .content-card {
            background: rgba(30, 41, 59, .5);
            border: 1px solid rgba(255, 255, 255, .05);
            padding: clamp(28px, 5vw, 50px);
            border-radius: 30px;
            text-align: center;
            max-width: 550px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, .5)
        }

        .profile-img {
            cursor: pointer;
            width: min(200px, 50vw);
            height: min(200px, 50vw);
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #38bdf8;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(56, 189, 248, .2);
            transition: .5s
        }

        .profile-img:hover {
            transform: scale(1.05);
            border: 5px solid #100480;
            box-shadow: 0 0 25px rgba(46, 26, 223, .6)
        }

        .badge-dev {
            display: inline-block;
            background: #38bdf8;
            color: #0f172a;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: .8rem;
            font-weight: bold;
            margin-bottom: 15px
        }

        h1 {
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            margin-bottom: 5px
        }

        h2 {
            color: #94a3b8;
            font-weight: 400;
            font-size: clamp(.9rem, 2.5vw, 1.1rem);
            margin-bottom: 20px
        }

        .hr-custom {
            border: 0;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, .1), transparent);
            margin: 20px 0
        }

        .actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .social-btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: white;
            color: black;
            text-decoration: none;
            padding: 7px 18px;
            border-radius: 18px;
            font-weight: 600;
            transition: .4s
        }

        .social-btn:hover {
            transform: translateY(-3px);
            box-shadow: 5px 8px 8px -3px rgba(242, 240, 240, .949);
            background: linear-gradient(45deg, #f09433, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888);
            color: white
        }

        .btn-cv {
            background: rgba(56, 189, 248, .1);
            color: #38bdf8;
            border: 1px solid #38bdf8;
        }

        .btn-cv:hover {
            background: #38bdf8;
            color: #0f172a;
            box-shadow: 0 5px 15px rgba(56, 189, 248, .4);
            transform: translateY(-3px);
        }

        /* Навыки */
        .skills-section {
            background: rgba(0, 0, 0, .2);
            border-radius: 16px;
            padding: 15px;
            margin-top: 20px;
            text-align: left;
            border: 1px solid rgba(255, 255, 255, .03);
        }

        .skills-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #64748b;
            margin-bottom: 12px;
            text-align: center;
        }

        .skills-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }

        .skill-badge {
            background: rgba(255, 255, 255, .05);
            border: 1px solid rgba(255, 255, 255, .1);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            color: #cbd5e1;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: .3s;
        }

        .skill-badge:hover {
            background: rgba(56, 189, 248, .15);
            border-color: #38bdf8;
            color: #38bdf8;
        }

        /* ---- ПРОЕКТЫ ---- */
        .projects-page {
            width: 100%;
            max-width: 900px;
            padding: 10px 0;
            align-items: flex-start !important
        }

        .projects-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
            width: 100%
        }

        .projects-title {
            font-size: clamp(1.2rem, 3vw, 1.6rem);
            font-weight: 700;
            color: #f1f5f9
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(min(220px, 100%), 1fr));
            gap: 16px;
            width: 100%
        }

        .project-card {
            background: rgba(30, 41, 59, .6);
            border: 1px solid rgba(255, 255, 255, .07);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            transition: transform .3s, box-shadow .3s, border-color .3s;
            display: flex;
            flex-direction: column
        }

        .project-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, .4);
            border-color: rgba(56, 189, 248, .3)
        }

        .project-thumb {
            height: min(130px, 30vw);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(2rem, 5vw, 2.8rem);
            position: relative;
            overflow: hidden
        }

        .project-thumb-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background .3s;
            font-size: clamp(.8rem, 2vw, 1rem);
            color: white;
            font-weight: 600;
            letter-spacing: .05em;
            opacity: 0;
            transition: all .3s
        }

        .project-card:hover .project-thumb-overlay {
            background: rgba(0, 0, 0, .45);
            opacity: 1
        }

        .project-body {
            padding: 16px;
            flex: 1
        }

        .project-name {
            font-size: clamp(.9rem, 2vw, 1rem);
            font-weight: 600;
            margin-bottom: 6px;
            color: #f1f5f9
        }

        .project-desc {
            font-size: clamp(.75rem, 1.8vw, .8rem);
            color: #64748b;
            line-height: 1.5
        }

        .project-footer {
            padding: 10px 16px;
            border-top: 1px solid rgba(255, 255, 255, .05);
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: .75rem;
            color: #38bdf8
        }

        .projects-empty {
            width: 100%;
            text-align: center;
            padding: 60px 20px;
            color: #475569;
            grid-column: 1/-1
        }

        .projects-empty i {
            font-size: 3rem;
            margin-bottom: 12px;
            display: block
        }

        body:has(.sidebar.mobile-open) .mobile-menu-btn {
    opacity: 0;
    pointer-events: none;
    transition: 0.2s;
}

/* Разрешаем кнопке-гамбургеру внутри сайдбара быть видимой на мобилках */
@media(max-width:640px){
    .sidebar #toggle-btn {
        display: flex !important; /* Форсируем отображение */
        position: absolute;
        top: 14px;
        right: 14px;
        color: #0f172a;
    }
}
    </style>
</head>

<body>

                </div>
            </div>
        </main>
    </div>

    <script>
        /* =============================================
           МУЛЬТИЯЗЫЧНОСТЬ (i18n)
        ============================================= */
        const translations = {
            ru: {
                navHome: "Главная",
                navProjects: "Проекты",
                badgeDev: "Разработчик",
                subtitle: "Начинающий FRONT END разработчик.",
                welcome: "Добро пожаловать на мою персональную страницу!",
                downloadCV: "Скачать CV",
                skillsTitle: "Мой стек технологий",
                projectsTitle: "Мои проекты",
                footerText: "© 2026 VirusV",
                openProject: "Открыть →",
                emptyProjects: "Проектов пока нет.<br>Добавь первый прямо в коде!"
            },
            en: {
                navHome: "Home",
                navProjects: "Projects",
                badgeDev: "Developer",
                subtitle: "Junior FRONT END Developer.",
                welcome: "Welcome to my personal page!",
                downloadCV: "Download CV",
                skillsTitle: "Tech Stack",
                projectsTitle: "My Projects",
                footerText: "© 2026 VirusV",
                openProject: "Open →",
                emptyProjects: "No projects yet.<br>Add the first one in the code!"
            },
            kk: {
                navHome: "Басты бет",
                navProjects: "Жобалар",
                badgeDev: "Әзірлеуші",
                subtitle: "Жаңадан бастаушы FRONT END әзірлеуші.",
                welcome: "Менің жеке парақшама қош келдіңіз!",
                downloadCV: "Түйіндемені жүктеу",
                skillsTitle: "Менің технологияларым",
                projectsTitle: "Менің жобаларым",
                footerText: "© 2026 VirusV",
                openProject: "Ашу →",
                emptyProjects: "Әзірге жобалар жоқ.<br>Біріншісін кодта қосыңыз!"
            }
        };

        let currentLang = localStorage.getItem('selectedLang') || 'ru';
        const langSwitch = document.getElementById('lang-switch');

        function setLanguage(lang) {
        currentLang = lang;
        localStorage.setItem('selectedLang', lang);
        langSwitch.value = lang;

        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (translations[lang][key]) {
                if (translations[lang][key].includes('<')) {
                    el.innerHTML = translations[lang][key];
                } else {
                    el.textContent = translations[lang][key];
                }
            }
        });
        
        // Перерисовываем проекты, чтобы обновить их тексты
        renderProjects();
    }

    langSwitch.addEventListener('change', (e) => setLanguage(e.target.value));

        /* =============================================

        ============================================= */
        const projects = [
            {
                name: { ru: 'Мой профиль', en: 'My Profile', kk: 'Менің профилім' },
                desc: { ru: 'Личная визитка разработчика', en: 'Personal developer portfolio card', kk: 'Әзірлеушінің жеке визиткасы' },
                url: 'https://vvtrest-collab.github.io/my_developer_visit/',
                icon: '💻', color: 'linear-gradient(135deg,#0f2744,#0f172a)'
            },
            {
                name: { ru: 'Зубной техник', en: 'Dental Technician', kk: 'Тіс технигі' },
                desc: { ru: 'Персональная визитка зубного техника', en: 'Personal business card for a dental technician', kk: 'Тіс технигінің жеке визиткасы' },
                url: 'https://vvtrest-collab.github.io/electronik_vizit/',
                icon: '🦷', color: 'linear-gradient(135deg,#1e3a5f,#0f172a)'
            },
            {
                name: { ru: 'Зубной техник (Dark)', en: 'Dental Technician Dark', kk: 'Тіс технигі (Қараңғы)' },
                desc: { ru: 'Персональная визитка (тёмная тема)', en: 'Personal business card (Dark theme)', kk: 'Жеке визитка (Қараңғы тақырып)' },
                url: 'https://vvtrest-collab.github.io/electronik_vizit_dark/',
                icon: '🦷', color: 'linear-gradient(135deg,#1e3a5f,#0f172a)'
            },
            {
                name: { ru: 'Barbershop Bot', en: 'Barbershop Bot', kk: 'Barbershop Bot' },
                desc: { ru: 'Telegram-бот для записи клиентов в барбершоп', en: 'Telegram bot for booking clients in a barbershop', kk: 'Барбершопқа жазылуға арналған Telegram-бот' },
                url: '#', // Замени на свою ссылку GitHub/Telegram
                icon: '✂️', color: 'linear-gradient(135deg,#b91d73,#f953c6)'
            },
        ];

        const grid = document.getElementById('projects-grid');

        function renderProjects() {
            grid.innerHTML = '';
            if (!projects.length) {
                grid.innerHTML = `<div class="projects-empty"><i class="bi bi-folder-x"></i><p>${translations[currentLang].emptyProjects}</p></div>`;
                return;
            }
            projects.forEach(p => {
                let hostname = '';
                try { hostname = new URL(p.url).hostname; } catch (e) { hostname = p.url; }
                if (hostname === window.location.hostname || hostname === '') hostname = 'GitHub / Local';

                const card = document.createElement('a');
                card.className = 'project-card'; card.href = p.url; card.target = '_blank'; card.rel = 'noopener noreferrer';

                // Достаем текст под текущий язык
                const pName = p.name[currentLang] || p.name.ru;
                const pDesc = p.desc[currentLang] || p.desc.ru;
                const openText = translations[currentLang].openProject;

                card.innerHTML = `
                <div class="project-thumb" style="background:${p.color}">
                    <span>${p.icon}</span>
                    <div class="project-thumb-overlay">${openText}</div>
                </div>
                <div class="project-body">
                    <div class="project-name">${pName}</div>
                    <div class="project-desc">${pDesc}</div>
                </div>
                <div class="project-footer"><i class="bi bi-box-arrow-up-right"></i><span>${hostname}</span></div>`;
                grid.appendChild(card);
            });
        }

        /* Инициализация языка и рендер */
        setLanguage(currentLang);

        /* Навигация */
        function showPage(name) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.sidebar-nav li').forEach(l => l.classList.remove('active'));
            document.getElementById('page-' + name).classList.add('active');
            document.getElementById('nav-' + name).classList.add('active');
            closeMobileSidebar();
        }

        /* Десктоп toggle */
        document.getElementById('toggle-btn').addEventListener('click', () => {
    if (window.innerWidth <= 640) {
        closeMobileSidebar(); // На мобилке кнопка внутри будет закрывать
    } else {
        sidebar.classList.toggle('collapsed'); // На ПК сворачивать
    }
});

        /* Мобильный toggle */
        const mBtn = document.getElementById('mobile-menu-btn');
        const overlay = document.getElementById('sidebar-overlay');
        const sb = document.getElementById('sidebar');

        mBtn.addEventListener('click', () => {
            sb.classList.toggle('mobile-open');
            overlay.classList.toggle('show');
        });
        overlay.addEventListener('click', closeMobileSidebar);

        function closeMobileSidebar() {
            sb.classList.remove('mobile-open');
            overlay.classList.remove('show');
        }
    </script>
</body>

</html>
